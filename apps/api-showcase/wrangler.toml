name = "betcopilot-ai-showcase-api"
main = "src/index.ts"
compatibility_date = "2026-04-17"
workers_dev = true

[vars]
APP_NAME = "BetCopilot AI"
APP_TAGLINE = "AI-Powered Betting Intelligence"
BRAND_FOOTER = "@BryteSikaStrategyAI"
MODEL_PROVIDER = "cloudflare-workers-ai"
MODEL_NAME = "@cf/meta/llama-3.1-8b-instruct"
